<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paras iya ha</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    padding:20px;
    box-sizing:border-box;
}

.container{
    text-align:center;
    width:100%;
    max-width:400px;
}

button{
    padding:12px 20px;
    font-size:16px;
    border:none;
    border-radius:25px;
    background:#ff4081;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

/* Removed zoom effect */
button:hover{
    opacity:0.9;
}

.letter{
    width:90%;
    max-width:350px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    margin:20px auto 0;
    opacity:0;
    transform:translateY(30px);
    transition:all 1s ease;
    display:none;
    box-sizing:border-box;
}

.letter.show{
    opacity:1;
    transform:translateY(0);
}

h2{
    font-size:22px;
}

p{
    font-size:15px;
    line-height:1.5;
}

video{
    width:100%;
    height:auto;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
    <button id="letterBtn" onclick="toggleLetter()">
        Open Birthday Letter
    </button>

    <div id="letter" class="letter">
        <h2>Belated Happy Birthday, Hernan!</h2>

        <p>
            Hello Hernan, belated happy 18th birthday! Keep safe and have a truly wonderful birthday. Sorry for everything I did to you. I know I made mistakes. Belated happy birthday, dol.
        </p>

        <p><b>Take care and good luck.</b></p>

        <video controls src="bday.mp4"></video>
    </div>
</div>

<script>
function toggleLetter() {
    const letter = document.getElementById("letter");
    const btn = document.getElementById("letterBtn");

    if (letter.classList.contains("show")) {
        letter.classList.remove("show");

        setTimeout(() => {
            letter.style.display = "none";
        }, 1000);

        btn.innerHTML = "Open Birthday Letter";
    } else {
        letter.style.display = "block";

        setTimeout(() => {
            letter.classList.add("show");
        }, 50);

        btn.innerHTML = "Close Letter";
    }
}
</script>

</body>
</html>
